name: MacCCTV

options:
  bundleIdPrefix: com.youngminpark.maccctv
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 878FAHTFQJ
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    SWIFT_VERSION: 5.0

packages:
  CCTVKit:
    path: Packages/CCTVKit

targets:
  MacCCTV:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: apps/mac/MacCCTV
    dependencies:
      - package: CCTVKit
        product: CCTVKit
    attributes:
      SystemCapabilities:
        com.apple.iCloud:
          enabled: 1
        com.apple.ApplicationGroups.Mac:
          enabled: 1
    settings:
      base:
        PRODUCT_NAME: MacCCTV
        PRODUCT_BUNDLE_IDENTIFIER: com.youngminpark.maccctv.ios
        INFOPLIST_FILE: apps/mac/MacCCTV/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: apps/mac/MacCCTV/Support/MacCCTV.entitlements
        ENABLE_HARDENED_RUNTIME: YES

  CCTVCompanion:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: apps/ios/CCTVCompanion
    dependencies:
      - package: CCTVKit
        product: CCTVKit
    attributes:
      SystemCapabilities:
        com.apple.iCloud:
          enabled: 1
        com.apple.ApplicationGroups.iOS:
          enabled: 1
        com.apple.Push:
          enabled: 1
    settings:
      base:
        PRODUCT_NAME: CCTVCompanion
        PRODUCT_BUNDLE_IDENTIFIER: com.youngminpark.maccctv.ios
        INFOPLIST_FILE: apps/ios/CCTVCompanion/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: apps/ios/CCTVCompanion/Support/CCTVCompanion.entitlements
