name: MacCCTV

options:
  bundleIdPrefix: com.youngminpark.maccctv
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 878FAHTFQJ
    CURRENT_PROJECT_VERSION: 18
    MARKETING_VERSION: 0.1.0
    SWIFT_VERSION: 5.0

packages:
  CCTVKit:
    path: Packages/CCTVKit
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: 128.0.0

targets:
  MacCCTV:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: apps/mac/MacCCTV
    dependencies:
      - package: CCTVKit
        product: CCTVKit
      - package: WebRTC
        product: WebRTC
    attributes:
      SystemCapabilities:
        com.apple.iCloud:
          enabled: 1
        com.apple.ApplicationGroups.Mac:
          enabled: 1
    settings:
      base:
        PRODUCT_NAME: MacCCTV
        PRODUCT_BUNDLE_IDENTIFIER: com.youngminpark.maccctv.mac
        INFOPLIST_FILE: apps/mac/MacCCTV/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: apps/mac/MacCCTV/Support/MacCCTV.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      management:
        shared: true
      storeKitConfiguration: Packages/CCTVKit/Tests/CCTVKitTests/Resources/MacCCTVTips.storekit
      testTargets:
        - MacCCTVTests

  MacCCTVTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: tests/mac/MacCCTVTests
      - path: Packages/CCTVKit/Tests/CCTVKitTests/Resources/MacCCTVTips.storekit
        buildPhase: resources
    dependencies:
      - target: MacCCTV
      - package: CCTVKit
        product: CCTVKit
      - sdk: StoreKitTest.framework
        root: DEVELOPER_DIR
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youngminpark.maccctv.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MacCCTV.app/Contents/MacOS/MacCCTV"
        BUNDLE_LOADER: "$(TEST_HOST)"

  CCTVCompanion:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: apps/ios/CCTVCompanion
    dependencies:
      - package: CCTVKit
        product: CCTVKit
      - package: WebRTC
        product: WebRTC
    attributes:
      SystemCapabilities:
        com.apple.iCloud:
          enabled: 1
        com.apple.ApplicationGroups.iOS:
          enabled: 1
        com.apple.Push:
          enabled: 1
    settings:
      base:
        PRODUCT_NAME: CCTVCompanion
        PRODUCT_BUNDLE_IDENTIFIER: com.youngminpark.maccctv.ios
        INFOPLIST_FILE: apps/ios/CCTVCompanion/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: apps/ios/CCTVCompanion/Support/CCTVCompanion.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      management:
        shared: true
      storeKitConfiguration: Packages/CCTVKit/Tests/CCTVKitTests/Resources/MacCCTVTips.storekit
